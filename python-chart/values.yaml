# ============================================================
# FastAPI
# ============================================================
fastapi:
  image: "wiki-service:local"
  replicas: 1
  port: 8000
  metrics:
    path: "/metrics"
  
  initContainer:
    enabled: true              # ← toggle this
    image: "busybox:1.28"      # pinnable version
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

autoscaling:
  enabled: false                        # off by default, opt-in
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70    # remove line to disable CPU metric
  targetMemoryUtilizationPercentage: 80 
# ============================================================
# Ingress
# ============================================================
ingress:
  enabled: true
  className: "traefik"
  paths:                          # all API paths in one place
    - path: /
    - path: /users
    - path: /user
    - path: /posts
  grafana:
    path: /grafana
    port: 80

# ============================================================
# PostgreSQL (Bitnami subchart values)
# ============================================================
postgresql:
  enabled: true
  image:
    tag: "latest"
    pullPolicy: Always  
  auth:
    username: app_user
    password: app_password
    database: app_db
  primary:
    persistence:
      enabled: true
      size: 1Gi
    resources:
      requests:
        cpu: "200m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

# ============================================================
# Prometheus (subchart values)
# ============================================================
prometheus:
  enabled: true
  server:
    persistentVolume:
      enabled: true
      size: 2Gi
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"
  alertmanager:
    enabled: false
  prometheus-node-exporter:
    enabled: false
  prometheus-pushgateway:
    enabled: false

# ============================================================
# Grafana (subchart values)
# ============================================================
grafana:
  enabled: true
  adminUser: admin
  adminPassword: admin
  grafana.ini:
    server:
      domain: localhost
      root_url: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      serve_from_sub_path: true
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: ""           # set dynamically in template via helper
          access: proxy
          isDefault: true

# ============================================================
# Dashboard ConfigMap
# ============================================================
dashboard:
  uid: "creation-dashboard-678"
  title: "Creation Rates"
  datasource: "Prometheus"