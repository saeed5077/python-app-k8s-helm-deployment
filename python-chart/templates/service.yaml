apiVersion: v1
kind: Service
metadata:
  name: {{ include "python-backend.fastapiName" . }}
  labels:
    {{- include "python-backend.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.fastapi.port }}
      targetPort: {{ .Values.fastapi.port }}
  selector:
    {{- include "python-backend.selectorLabels" . | nindent 4 }}